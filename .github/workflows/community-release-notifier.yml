name: community-release-notifier
'on':
  release:
    types:
    - released
  workflow_call:
    inputs:
      tag_name:
        required: true
        description: Release tag_name
        type: string
      url:
        required: true
        description: release URL
        type: string
      body:
        required: true
        description: Release Body
        type: string
        default: ''
    secrets:
      DISCORD_WEBHOOK_RELEASE_NOTES:
        description: Discord Webhook for Notifying Releases to Discord
        required: true
      TELEGRAM_BOT_TOKEN:
        description: Telegram Bot Token
        required: true
      TELEGRAM_CHAT_ID:
        description: Telegram Chat ID (group/channel/supergroup)
        required: true
      TELEGRAM_MESSAGE_THREAD_ID:
        description: Topic / message_thread_id for Telegram forum/topic
        required: true
jobs:
  notify:
    if: github.repository_owner == 'playground-nils'
    runs-on: ubuntu-latest
    steps:
    - name: Prepare release variables
      id: vars
      env:
        INPUT_TAG: ${{ github.event.release.tag_name || inputs.tag_name }}
        INPUT_URL: ${{ github.event.release.url || inputs.url }}
        INPUT_BODY: ${{ github.event.release.body || inputs.body }}
      run: "TAG=\"$INPUT_TAG\"\nURL=\"$INPUT_URL\"\n\n# Generate a random delimiter\
        \ (hex string, safe and collision-resistant)\nDELIMITER=$(openssl rand -hex\
        \ 16 || head -c 16 /dev/urandom | xxd -p -c 16)\n\n# Escape problematic characters\
        \ for MarkdownV2 (very conservative escaping)\n# We escape: _ * [ ] ( ) ~\
        \ ` > # + - = | { } . ! \\\nBODY_SAFE=$(printf '%s' \"$INPUT_BODY\" | \\\n\
        \  sed 's/[_*[\\]()~`>#+=|{}.!\\\\-]/\\\\&/g')\nTAG_SAFE=$(printf '%s' \"\
        $TAG\" | sed 's/[_*[\\]()~`>#+=|{}.!\\\\-]/\\\\&/g')\n\nif [[ \"$TAG\" ==\
        \ *\"-nightly\"* ]]; then\n  SUFFIX=\" \\(Nightly Release\\)\"\n  SUFFIXPLAIN=\"\
        \ (Nightly Release)\"\nelse\n  SUFFIX=\"\"\n  SUFFIXPLAIN=\"\"\nfi\n\n# Announcement\
        \ line \u2014 also escape for safety\nANNOUNCE_SAFE=\"\U0001F4E2 Acode [$TAG_SAFE]($URL)\
        \ was just Released \U0001F389${SUFFIX}\\\\!\"\n\necho \"announce=$ANNOUNCE_SAFE\"\
        \ >> $GITHUB_OUTPUT\n{\n  echo \"body_safe<<$DELIMITER\"\n  printf '%s\\n'\
        \ \"$BODY_SAFE\"\n  echo \"$DELIMITER\"\n} >> $GITHUB_OUTPUT\n\n# Plain (MD)\
        \ Announcement for Discord\nANNOUNCE_PLAIN=\"\U0001F4E2 Acode [$TAG](<$URL>)\
        \ was just Released \U0001F389${SUFFIXPLAIN}!\"\necho \"announce_plain=$ANNOUNCE_PLAIN\"\
        \ >> $GITHUB_OUTPUT\n{\n  echo \"body_plain<<$DELIMITER\"\n  printf '%s\\\
        n' \"$INPUT_BODY\"\n  echo \"$DELIMITER\"\n} >> $GITHUB_OUTPUT\n"
    - name: Truncate message for Discord
      id: truncate-discord
      uses: 2428392/gh-truncate-string-action@b3ff790d21cf42af3ca7579146eedb93c8fb0757
      with:
        maxLength: 2000
        stringToTruncate: '${{ steps.vars.outputs.announce_plain }}


          ${{ steps.vars.outputs.body_plain }}

          '
    - name: Discord Webhook (Publishing)
      uses: tsickert/discord-webhook@b217a69502f52803de774ded2b1ab7c282e99645
      with:
        webhook-url: ${{ secrets.DISCORD_WEBHOOK_RELEASE_NOTES }}
        content: ${{ steps.truncate-discord.outputs.string }}
        flags: 4
    - name: Send to Telegram
      uses: Salmansha08/telegram-github-action@17c9ce6b4210d2659dca29d34028b02fa29d70ad
      with:
        to: ${{ secrets.TELEGRAM_CHAT_ID }}
        token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        message: '${{ steps.vars.outputs.announce }}


          ${{ steps.vars.outputs.body_safe }}

          '
        format: markdown
        disable_web_page_preview: true
        message_thread_id: ${{ secrets.TELEGRAM_MESSAGE_THREAD_ID }}
      continue-on-error: true
